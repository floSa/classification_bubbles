services:
  # -----------------------------------------------------------------------------
  # INFRASTRUCTURE
  # -----------------------------------------------------------------------------
  timescale_db:
    image: timescale/timescaledb:latest-pg14
    container_name: bubble_timescale
    environment:
      - POSTGRES_USER=${TIMESCALE_USER}
      - POSTGRES_PASSWORD=${TIMESCALE_PASSWORD}
      - POSTGRES_DB=${TIMESCALE_DB}
    ports:
      - "${TIMESCALE_PORT}:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./init-scripts/timescale_init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bubble_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${TIMESCALE_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo_db:
    image: mongo:latest
    container_name: bubble_mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - bubble_net

  minio-db:
    image: minio/minio:latest
    container_name: bubble_minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    networks:
      - bubble_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  # Service to create MinIO buckets automatically
  minio_init:
    image: minio/mc
    depends_on:
      minio-db:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " /usr/bin/mc alias set myminio http://minio-db:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; /usr/bin/mc mb myminio/spectrograms; /usr/bin/mc anonymous set public myminio/spectrograms; exit 0; "
    networks:
      - bubble_net

  # -----------------------------------------------------------------------------
  # APPLICATION SERVICES
  # -----------------------------------------------------------------------------
  acquisition:
    build:
      context: .
      dockerfile: services/acquisition/Dockerfile
    container_name: bubble_acquisition
    environment:
      - TIMESCALE_HOST=timescale_db
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=${TIMESCALE_USER}
      - TIMESCALE_PASSWORD=${TIMESCALE_PASSWORD}
      - TIMESCALE_DB=${TIMESCALE_DB}
      # Options de simulation (défauts sûrs si non définies dans .env)
      - LABEL_NOISE_RATE=${LABEL_NOISE_RATE:-0.0}
      - FORCE_CLEAN=${FORCE_CLEAN:-false}
    depends_on:
      timescale_db:
        condition: service_healthy
    volumes:
      - ./models:/app/models
    networks:
      - bubble_net
    restart: always

  extraction:
    build:
      context: .
      dockerfile: services/extraction/Dockerfile
    container_name: bubble_extraction
    environment:
      - TIMESCALE_HOST=timescale_db
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=${TIMESCALE_USER}
      - TIMESCALE_PASSWORD=${TIMESCALE_PASSWORD}
      - TIMESCALE_DB=${TIMESCALE_DB}
      - MONGO_HOST=mongo_db
      - MONGO_PORT=27017
      - MONGO_USER=${MONGO_ROOT_USER}
      - MONGO_PASSWORD=${MONGO_ROOT_PASSWORD}
    depends_on:
      timescale_db:
        condition: service_healthy
      mongo_db:
        condition: service_started
    networks:
      - bubble_net
    restart: always

  transformation:
    build:
      context: .
      dockerfile: services/transformation/Dockerfile
    container_name: bubble_transformation
    environment:
      - MONGO_HOST=mongo_db
      - MONGO_PORT=27017
      - MONGO_USER=${MONGO_ROOT_USER}
      - MONGO_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MINIO_ENDPOINT=minio-db:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
    depends_on:
      mongo_db:
        condition: service_started
      minio-db:
        condition: service_healthy
    networks:
      - bubble_net
    restart: always

  training:
    build:
      context: .
      dockerfile: services/training/Dockerfile
    container_name: bubble_training
    # GPU Support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    environment:
      - TIMESCALE_HOST=timescale_db
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=${TIMESCALE_USER}
      - TIMESCALE_PASSWORD=${TIMESCALE_PASSWORD}
      - TIMESCALE_DB=${TIMESCALE_DB}
      - MONGO_HOST=mongo_db
      - MONGO_PORT=27017
      - MONGO_USER=${MONGO_ROOT_USER}
      - MONGO_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MINIO_ENDPOINT=minio-db:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./models:/app/models
    depends_on:
      mongo_db:
        condition: service_started
      minio-db:
        condition: service_healthy
    networks:
      - bubble_net
    shm_size: 2gb
    profiles: [ "training" ]

  inference:
    build:
      context: .
      dockerfile: services/inference/Dockerfile
    container_name: bubble_inference
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    environment:
      - MONGO_HOST=mongo_db
      - MONGO_PORT=27017
      - MONGO_USER=${MONGO_ROOT_USER}
      - MONGO_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MINIO_ENDPOINT=minio-db:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./models:/app/models
    depends_on:
      mongo_db:
        condition: service_started
      minio-db:
        condition: service_healthy
    networks:
      - bubble_net
    shm_size: 2gb
    restart: always

  app:
    build:
      context: .
      dockerfile: services/app/Dockerfile
    container_name: bubble_dashboard
    ports:
      - "8501:8501"
    environment:
      - TIMESCALE_HOST=timescale_db
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=${TIMESCALE_USER}
      - TIMESCALE_PASSWORD=${TIMESCALE_PASSWORD}
      - TIMESCALE_DB=${TIMESCALE_DB}
      - MONGO_HOST=mongo_db
      - MONGO_PORT=27017
      - MONGO_USER=${MONGO_ROOT_USER}
      - MONGO_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MINIO_ENDPOINT=minio-db:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./models:/app/models
    depends_on:
      timescale_db:
        condition: service_healthy
      mongo_db:
        condition: service_started
      minio-db:
        condition: service_healthy
    networks:
      - bubble_net

volumes:
  timescale_data:
  mongo_data:
  minio_data:


networks:
  bubble_net:
    driver: bridge
